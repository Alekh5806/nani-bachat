databases:
  - name: nanibachat-db
    plan: free
    databaseName: nanibachat
    user: nanibachat

services:
  - type: web
    name: nanibachat-api
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn poolvest.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nanibachat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: PYTHON_VERSION
        value: "3.12.0"
